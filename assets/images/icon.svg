<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d6efd" />
      <stop offset="100%" stop-color="#052e16" />
    </linearGradient>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>
  
  <!-- Outer Rounded Container -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  
  <!-- Icon Graphics (Calendar + Check/Leaf concept) -->
  <g filter="url(#shadow)">
    <!-- Calendar Base -->
    <rect x="128" y="144" width="256" height="240" rx="32" fill="url(#icon-grad)" />
    <!-- Calendar Header -->
    <rect x="128" y="144" width="256" height="64" rx="16" fill="#0d6efd" />
    <!-- Small calendar rings -->
    <rect x="176" y="112" width="24" height="48" rx="8" fill="#ffffff" />
    <rect x="312" y="112" width="24" height="48" rx="8" fill="#ffffff" />
    
    <!-- Leave Checkmark (Leaf-like swoosh) -->
    <path d="M 200,280 L 240,320 L 328,220" 
          stroke="#10b981" 
          stroke-width="28" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none" />
  </g>
</svg>
